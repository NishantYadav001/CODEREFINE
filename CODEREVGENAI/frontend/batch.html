<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Analysis - Code Refine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">
    <!-- Modern Navigation -->
    <nav class="bg-white/5 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-layer-group text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Batch Analysis</h1>
                        <p class="text-xs text-gray-400">Process Multiple Files</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="fas fa-moon text-yellow-400"></i>
                    </button>
                    <a href="/app" class="btn-secondary btn-sm">Back to Editor</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8 max-w-5xl">
        <div class="card border-2 border-dashed border-white/20 hover:border-blue-500/50 text-center transition-all cursor-pointer" id="drop-zone">
            <i class="fas fa-cloud-upload-alt text-6xl text-blue-400 mb-4 animate-pulse"></i>
            <p class="text-2xl font-bold mb-2 text-white">Drag & Drop code files here</p>
            <p class="text-gray-400 mb-6">or</p>
            <input type="file" id="file-input" multiple class="hidden">
            <button onclick="document.getElementById('file-input').click()" class="btn-primary">
                <i class="fas fa-folder-open mr-2"></i>Select Files
            </button>
        </div>

        <div id="results-area" class="mt-8 hidden">
            <div class="card">
                <h2 class="text-2xl font-bold mb-6 text-white">Analysis Results</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-white/5 text-gray-300 text-xs uppercase">
                                <th class="p-4 font-bold">Filename</th>
                                <th class="p-4 font-bold">Size</th>
                                <th class="p-4 font-bold">Complexity (Est.)</th>
                                <th class="p-4 font-bold">Status</th>
                            </tr>
                        </thead>
                        <tbody id="results-body" class="divide-y divide-white/5">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500', 'bg-gray-700'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-blue-500', 'bg-gray-700'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-gray-700');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        async function handleFiles(files) {
            if (files.length === 0) return;

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            document.getElementById('results-area').classList.remove('hidden');
            const tbody = document.getElementById('results-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-3 text-center">Processing...</td></tr>';

            try {
                const res = await fetch('/api/batch-analyze', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                tbody.innerHTML = '';
                data.results.forEach(r => {
                    const row = `
                        <tr class="bg-gray-800 hover:bg-gray-750">
                            <td class="p-3">${r.filename}</td>
                            <td class="p-3">${r.size_bytes} bytes</td>
                            <td class="p-3"><span class="bg-blue-900 text-blue-200 px-2 py-1 rounded text-xs">${r.complexity}</span></td>
                            <td class="p-3 text-green-400"><i class="fas fa-check-circle"></i> Done</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-3 text-red-500">Error: ${err.message}</td></tr>`;
            }
        }
    </script>
    <script src="router.js"></script>
    <script src="routing-utils.js"></script>
    <script src="/assets/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            window.router = new Router();
            await window.router.init();
            if (!window.router.isAuthenticated()) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>

</html>
