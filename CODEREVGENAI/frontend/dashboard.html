<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - CodeRefine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/assets/styles.css">
    <style>
        button.bg-slate-800 { background-color: var(--bg-secondary) !important; color: var(--text-primary) !important; }
    </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">
    <!-- Modern Navigation -->
    <nav class="bg-white/5 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-chart-line text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Student Dashboard</h1>
                        <p class="text-xs text-gray-400">Monitor engagement & integrity</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="fas fa-moon text-yellow-400"></i>
                    </button>
                    <a href="/profile" class="btn-secondary btn-sm">
                        <i class="fas fa-user mr-2"></i>Profile
                    </a>
                    <a href="/app" class="btn-secondary btn-sm">
                        <i class="fas fa-arrow-left mr-2"></i>Back
                    </a>
                    <button onclick="logout()" class="btn-danger btn-sm">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto max-w-6xl px-6 py-8">

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="card hover-lift stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Active Students</p>
                        <p id="total-students" class="text-4xl font-bold mt-2 text-gradient">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-users text-blue-400 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="card hover-lift stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Total Reviews</p>
                        <p id="total-reviews" class="text-4xl font-bold mt-2 text-purple-400">0</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-clipboard-check text-purple-400 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="card hover-lift stat-card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-400 text-xs font-bold uppercase tracking-wider">Database</p>
                        <button onclick="resetPlag()" class="mt-2 btn-danger btn-sm">
                            <i class="fas fa-trash mr-2"></i>Reset
                        </button>
                    </div>
                    <div class="w-12 h-12 bg-red-500/20 rounded-xl flex items-center justify-center">
                        <i class="fas fa-database text-red-400 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chart Card -->
        <div class="card">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-white">Student Activity Analysis</h3>
                <span class="badge badge-info"><i class="fas fa-chart-bar mr-2"></i>Analytics</span>
            </div>
            <div class="bg-white/5 rounded-xl p-4">
                <canvas id="activityChart" class="max-h-[400px]"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Guest Access Control
        const username = localStorage.getItem('username') || sessionStorage.getItem('username');
        if (!username || username === 'Guest') {
            window.location.replace('/login');
        }

        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard-data');
                const data = await res.json();

                document.getElementById('total-students').innerText = data.total_students || 0;
                document.getElementById('total-reviews').innerText = data.total_reviews || 0;

                const ctx = document.getElementById('activityChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Number of Reviews',
                        data: data.data,
                        backgroundColor: '#38bdf8',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
            } catch (e) {
                console.error("Failed to load dashboard", e);
            }
        }
        
        async function resetPlag() {
            if(confirm("Are you sure? This clears the plagiarism memory.")) {
                await fetch('/api/reset-plagiarism', { method: 'POST' });
                location.reload();
            }
        }

        function logout() {
            if (window.router) {
                window.router.logout();
            }
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = '/landing.html';
        }

        loadDashboard();
    </script>
    <script src="router.js"></script>
    <script src="routing-utils.js"></script>
    <script src="/assets/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            window.router = new Router();
            await window.router.init();
            
            // Require authentication
            if (!window.router.isAuthenticated()) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>
</html>
