<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Code - Code Refine</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="generate">
    <div class="nav">
        <div class="brand">Code Refine</div>
        <div class="nav-links">
            <span id="user-label" class="helper"></span>
            <a class="btn btn-outline" href="/app">Fix Code</a>
            <button class="btn btn-danger" data-logout>Logout</button>
        </div>
    </div>

    <div class="container">
        <section class="section">
            <h2 class="page-title">Generate Code</h2>
            <p class="muted">Describe what you want and select a language.</p>
        </section>

        <section class="section split">
            <div class="card">
                <h3>Prompt</h3>
                <textarea id="prompt-input" placeholder="Example: Build a REST API with CRUD endpoints for tasks"></textarea>
                <div class="form-group">
                    <label for="language-select">Language</label>
                    <select id="language-select">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="typescript">TypeScript</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                    </select>
                </div>
                <div class="toolbar">
                    <button id="generate-btn" class="btn btn-primary">Generate</button>
                </div>
                <div id="generate-msg" class="alert" style="display:block;"></div>
            </div>
            <div class="card">
                <h3>Generated Code</h3>
                <div id="generate-output" class="output"></div>
            </div>
        </section>
    </div>

    <div class="footer">Generated code is produced by the configured AI model.</div>
    <script src="/assets/main.js"></script>
</body>
</html>
