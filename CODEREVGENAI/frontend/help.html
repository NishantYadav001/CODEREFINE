<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help & Documentation - Code Refine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">
    <!-- Modern Navigation -->
    <nav class="bg-white/5 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-red-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-question-circle text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Help Center</h1>
                        <p class="text-xs text-gray-400">Documentation & Support</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="fas fa-moon text-yellow-400"></i>
                    </button>
                    <a href="/app" class="btn-secondary btn-sm">Back to Editor</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8 max-w-5xl">
        <h1 class="text-4xl font-bold mb-4 text-center text-white">How can we help you?</h1>
        <p class="text-center text-gray-400 mb-12">Find answers to common questions</p>

        <div class="space-y-4 mb-12" id="faq-container">
            <!-- FAQs injected here -->
            <div class="card text-center">
                <div class="animate-pulse">
                    <div class="h-4 bg-white/10 rounded w-3/4 mx-auto mb-3"></div>
                    <div class="h-4 bg-white/10 rounded w-1/2 mx-auto"></div>
                </div>
                <p class="text-gray-400 mt-4">Loading documentation...</p>
            </div>
        </div>

        <div class="card bg-gradient-to-br from-blue-500/20 to-purple-500/20 border-blue-500/30">
            <div class="flex items-start gap-4">
                <div class="w-12 h-12 bg-blue-500/30 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-headset text-blue-400 text-xl"></i>
                </div>
                <div class="flex-1">
                    <h2 class="text-2xl font-bold mb-2 text-white">Need more support?</h2>
                    <p class="text-gray-300 mb-4">Contact our development team for specific issues or feature requests.</p>
                    <a href="mailto:support@coderefine.ai" class="btn-primary inline-flex items-center">
                        <i class="fas fa-envelope mr-2"></i>Contact Support
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadFaq() {
            try {
                const res = await fetch('/api/help/faq');
                const data = await res.json();
                const container = document.getElementById('faq-container');
                
                container.innerHTML = '';
                
                data.categories.forEach(cat => {
                    const section = document.createElement('div');
                    section.className = 'mb-8';
                    
                    const title = document.createElement('h2');
                    title.className = 'text-2xl font-bold mb-4 text-blue-400 border-b border-gray-700 pb-2';
                    title.innerText = cat.name;
                    section.appendChild(title);
                    
                    cat.items.forEach(item => {
                        const details = document.createElement('details');
                        details.className = 'bg-gray-800 rounded-lg mb-2 border border-gray-700 overflow-hidden group';
                        
                        const summary = document.createElement('summary');
                        summary.className = 'p-4 cursor-pointer font-medium flex justify-between items-center hover:bg-gray-750 transition-colors';
                        summary.innerHTML = `<span>${item.question}</span><i class="fas fa-chevron-down text-gray-500 group-open:rotate-180 transition-transform"></i>`;
                        
                        const answer = document.createElement('div');
                        answer.className = 'p-4 text-gray-300 border-t border-gray-700 bg-gray-850';
                        answer.innerHTML = item.answer;
                        
                        details.appendChild(summary);
                        details.appendChild(answer);
                        section.appendChild(details);
                    });
                    
                    container.appendChild(section);
                });
            } catch (e) {
                console.error(e);
            }
        }

        loadFaq();
    </script>
    <script src="router.js"></script>
    <script src="routing-utils.js"></script>
    <script src="/assets/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            window.router = new Router();
            await window.router.init();
            // Help page is accessible to all (guest, user, admin)
        });
    </script>
</body>

</html>
