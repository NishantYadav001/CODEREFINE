<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Fix - Code Refine</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="app">
    <div class="nav">
        <div class="brand">Code Refine</div>
        <div class="nav-links">
            <span id="user-label" class="helper"></span>
            <a class="btn btn-outline" href="/generate">Generate Code</a>
            <button class="btn btn-danger" data-logout>Logout</button>
        </div>
    </div>

    <div class="container">
        <section class="section">
            <h2 class="page-title">Fix Code</h2>
            <p class="muted">Paste code below and get a clean, improved version.</p>
        </section>

        <section class="section split">
            <div class="card">
                <h3>Input Code</h3>
                <textarea id="code-input" placeholder="Paste code here..."></textarea>
                <div class="toolbar" style="margin-top:12px;">
                    <button id="fix-btn" class="btn btn-primary">Fix Code</button>
                    <button id="clear-btn" class="btn btn-outline">Clear</button>
                </div>
                <div id="fix-msg" class="alert" style="display:block;"></div>
            </div>
            <div class="card">
                <h3>Fixed Output</h3>
                <div id="fix-output" class="output"></div>
                <div class="toolbar" style="margin-top:12px;">
                    <button id="copy-btn" class="btn btn-outline">Copy Output</button>
                </div>
            </div>
        </section>
    </div>

    <div class="footer">Fixes are generated using AI models configured on the backend.</div>
    <script src="/assets/main.js"></script>
</body>
</html>
