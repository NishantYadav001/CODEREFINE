<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Code Refine</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="login">
    <div class="nav">
        <div class="brand">Code Refine</div>
        <div class="nav-links">
            <a class="btn btn-outline" href="/">Home</a>
            <a class="btn btn-primary" href="/signup">Create Account</a>
        </div>
    </div>

    <div class="container">
        <section class="section">
            <div class="card form">
                <h2 class="page-title">Sign In</h2>
                <p class="muted">Access your workspace and start fixing code.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username or Email</label>
                        <input id="login-username" type="text" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input id="login-password" type="password" placeholder="Your password" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Login</button>
                    <div id="login-msg" class="alert" style="display:block;"></div>
                </form>
                <p class="helper">No account? <a href="/signup">Create one</a></p>
            </div>
        </section>
    </div>

    <div class="footer">Secure login for users and admins.</div>
    <script src="/assets/main.js"></script>
</body>
</html>
