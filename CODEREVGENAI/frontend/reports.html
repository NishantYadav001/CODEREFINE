<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Reports - Code Refine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);">

    <!-- Modern Navigation -->
    <nav class="bg-white/5 backdrop-blur-lg border-b border-white/10 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-file-alt text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-white">Report History</h1>
                        <p class="text-xs text-gray-400">Saved Reports</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button id="theme-toggle" class="btn-icon">
                        <i class="fas fa-moon text-yellow-400"></i>
                    </button>
                    <a href="/app" class="btn-secondary btn-sm">Back to Editor</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8 max-w-6xl">
        <div class="card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white">Generated Reports</h2>
                <button onclick="loadReports()" class="btn-secondary btn-sm">
                    <i class="fas fa-sync mr-2"></i>Refresh
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-gray-300 text-xs uppercase">
                            <th class="p-4 font-bold">Filename</th>
                            <th class="p-4 font-bold">Date Created</th>
                            <th class="p-4 font-bold">Size</th>
                            <th class="p-4 font-bold text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reports-list" class="divide-y divide-white/5">
                        <!-- Reports injected here -->
                        <tr><td colspan="4" class="p-6 text-center text-gray-400">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function loadReports() {
            const tbody = document.getElementById('reports-list');
            try {
                const res = await fetch('/api/reports');
                const data = await res.json();
                
                if (data.reports.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">No reports saved yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.reports.forEach(report => {
                    const date = new Date(report.created).toLocaleString();
                    const size = (report.size / 1024).toFixed(1) + ' KB';
                    const icon = report.filename.endsWith('.pdf') ? 'fa-file-pdf text-red-400' : 'fa-file-word text-blue-400';
                    
                    const row = `
                        <tr class="hover:bg-white/5 transition-all">
                            <td class="p-4 flex items-center gap-3">
                                <i class="fas ${icon} text-xl"></i>
                                <span class="font-medium text-white">${report.filename}</span>
                            </td>
                            <td class="p-4 text-gray-300">${date}</td>
                            <td class="p-4 text-gray-300">${size}</td>
                            <td class="p-4 text-right space-x-2">
                                <a href="/api/reports/${report.filename}" target="_blank" class="btn-primary btn-sm inline-flex items-center">
                                    <i class="fas fa-download mr-2"></i> Download
                                </a>
                                <button onclick="deleteReport('${report.filename}')" class="btn-danger btn-sm">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Error loading reports</td></tr>`;
            }
        }

        async function deleteReport(filename) {
            if(!confirm('Are you sure you want to delete this report?')) return;
            await fetch(`/api/reports/${filename}`, { method: 'DELETE' });
            loadReports();
        }

        loadReports();
    </script>
    <script src="router.js"></script>
    <script src="routing-utils.js"></script>
    <script src="/assets/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            window.router = new Router();
            await window.router.init();
            if (!window.router.isAuthenticated()) {
                window.location.href = '/login.html';
            }
        });
    </script>
</body>

</html>
