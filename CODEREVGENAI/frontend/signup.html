<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Code Refine</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body data-page="signup">
    <div class="nav">
        <div class="brand">Code Refine</div>
        <div class="nav-links">
            <a class="btn btn-outline" href="/">Home</a>
            <a class="btn btn-primary" href="/login">Login</a>
        </div>
    </div>

    <div class="container">
        <section class="section">
            <div class="card form">
                <h2 class="page-title">Create Account</h2>
                <p class="muted">Start fixing and generating code immediately.</p>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input id="signup-username" type="text" placeholder="yourname" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input id="signup-email" type="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input id="signup-password" type="password" placeholder="Create a password" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Sign Up</button>
                    <div id="signup-msg" class="alert" style="display:block;"></div>
                </form>
                <p class="helper">Already have an account? <a href="/login">Login</a></p>
            </div>
        </section>
    </div>

    <div class="footer">User and admin accounts supported.</div>
    <script src="/assets/main.js"></script>
</body>
</html>
